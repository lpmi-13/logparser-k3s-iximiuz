kind: playground
name: log-parser-lab-k3s-dd84febf
base: flexbox
title: Log Parser
description: A playground that generates one log parsing activity at a time, and regenerates a new one when you complete each activity.
categories:
    - linux
markdown: |-
    A playground to practice parsing log lines via general Linux cli tools:

    - grep
    - awk
    - sort
    - uniq
    - head
    - wc
playground:
    networks:
        - name: local
          subnet: 172.16.0.0/24
    machines:
        - name: cplane-01
          users:
            - name: root
            - name: laborant
              default: true
              welcome: |
                This lab generates a single active log file on disk and expects you to write the correct answer to "/tmp/log-lab/answer.txt". After you put the correct answer in the file, a new activity will be regenerated.

                Check the notifications tab to see the instructions, and send the log parsing result to the answer file in /tmp/log-lab/answer.txt.

                $ cat /var/log/log-lab/LOG_FILE | <your pipeline> > /tmp/log-lab/answer.txt

                Useful tools include grep, awk, sed, sort, uniq, head, and wc. Open the notifications tab to watch resets and new rounds appear.
          drives:
            - source: oci://ghcr.io/lpmi-13/k3s-logparser-iximiuz:v4
              mount: /
              size: 30GiB
          network:
            interfaces:
                - address: 172.16.0.2/24
                  network: local
          resources:
            cpuCount: 2
            ramSize: 4GiB
    tabs:
        - id: terminal-cplane-01
          kind: terminal
          name: cplane-01
          machine: cplane-01
        - id: http-port-logparser-notifications
          kind: http-port
          name: notifications
          machine: cplane-01
          number: 8888
          access: public
    initTasks:
        init_cplane_01_1:
            name: init_cplane_01_1
            machine: cplane-01
            init: true
            user: root
            timeout_seconds: 90
            run: |-
                #!/bin/bash

                for _ in $(seq 1 60); do
                  if kubectl get --raw=/readyz >/dev/null 2>&1; then
                    break
                  fi
                  sleep 1
                done

                kubectl get --raw=/readyz >/dev/null 2>&1 || {
                  echo "k3s API did not become ready in time" >&2
                  exit 1
                }

                kubectl wait --for=condition=Established --timeout=60s \
                  crd/logparserlabs.lab.learning.io

                for _ in $(seq 1 60); do
                  state="$(kubectl get logparserlab -n log-lab log-lab -o jsonpath='{.status.state}' 2>/dev/null || true)"
                  if [ "${state}" = "Active" ]; then
                    exit 0
                  fi
                  sleep 1
                done

                echo "LogParserLab did not become active in time" >&2
                exit 1
    accessControl:
        canList:
            - anyone
        canRead:
            - anyone
        canStart:
            - anyone
